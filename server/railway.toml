[build]
builder = "NIXPACKS"
buildCommand = "npm run build --workspace=server && npx prisma db push --skip-generate --accept-data-loss"

[deploy]
startCommand = "npm run start --workspace=server"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ronbri-server"
