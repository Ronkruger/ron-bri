[build]
builder = "NIXPACKS"
buildCommand = "npm run build --workspace=server && cd server && npx ts-node prisma/seed.ts"

[deploy]
startCommand = "npx prisma migrate deploy --schema=server/prisma/schema.prisma && npm run start --workspace=server"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ronbri-server"
